name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout du code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Java (pour backend)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3️⃣ Build du backend Spring Boot (génère le JAR)
      - name: Build Backend with Maven
        run: |
          cd springboot/app
          mvn clean package -DskipTests

      # 4️⃣ Login Docker Hub avec secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5️⃣ Build de l’image backend (dockerfile dans springboot/app)
      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest ./springboot/app

      # 6️⃣ Push de l’image backend sur Docker Hub
      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest

      # 7️⃣ Build de l’image frontend (dockerfile dans angular-app)
      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest ./angular-app

      # 8️⃣ Push de l’image frontend sur Docker Hub
      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      # 9️⃣ Test : lancer l’application avec Docker Compose
      - name: Run Docker Compose
        run: |
          docker compose up -d
          sleep 20
          docker ps